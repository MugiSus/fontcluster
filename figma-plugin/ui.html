<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        box-sizing: border-box;
        margin: 0;
        padding: 14px;
        color: #1f1f1f;
        font:
          12px/1.45 Inter,
          sans-serif;
      }

      .title {
        margin-bottom: 6px;
        font-weight: 600;
      }

      .status {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="title">Fontcluster</div>
    <div id="status" class="status">Waiting for Fontcluster...</div>

    <script>
      const BRIDGE_URL = 'http://localhost:38653/latest';
      const statusElement = document.getElementById('status');
      let lastSequence = 0;

      function setStatus(message) {
        statusElement.textContent = message;
      }

      async function pollBridge() {
        try {
          const response = await fetch(BRIDGE_URL, { cache: 'no-store' });
          if (!response.ok) {
            setStatus('Fontcluster bridge is not responding.');
            return;
          }

          const bridgeState = await response.json();
          if (bridgeState.font && Number(bridgeState.sequence) > lastSequence) {
            lastSequence = Number(bridgeState.sequence);
            setStatus(`Applying ${bridgeState.font.fontName}...`);
            parent.postMessage(
              {
                pluginMessage: {
                  type: 'apply-font',
                  payload: bridgeState.font,
                  sequence: lastSequence,
                },
              },
              '*',
            );
          }
        } catch (error) {
          setStatus('Start Fontcluster, then click a FontItem.');
        }
      }

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message || message.type !== 'apply-result') return;

        setStatus(message.message);
      };

      pollBridge();
      setInterval(pollBridge, 500);
    </script>
  </body>
</html>
