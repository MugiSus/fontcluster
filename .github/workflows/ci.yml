name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck, lint, format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: install dependencies
        run: pnpm install

      - name: check (typecheck + lint + format)
        run: pnpm run check
